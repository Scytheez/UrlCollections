name: Deploy React Site

on:
  push:
    branches:
      - main  # Triggers the build whenever you commit/edit code on main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-size: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci  # Cleaner installation for automated environments

      - name: Build Production Bundle
        run: npm run build

      - name: Deploy to GitHub Pages Branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist  # Vite outputs production assets into the 'dist' directory
          branch: gh-pages  # The target branch for hosting your live site
